<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RemoteMaster — Session</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0a0a0a;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  #toolbar {
    height: 38px;
    background: #1a1d27;
    border-bottom: 1px solid #2d3348;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 12px;
    flex-shrink: 0;
    user-select: none;
  }
  .toolbar-logo {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #6366f1;
  }
  .toolbar-code {
    font-size: 12px;
    color: #64748b;
  }
  #statusDot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #64748b;
    flex-shrink: 0;
  }
  #statusDot.connected { background: #4ade80; }
  #statusDot.waiting { background: #facc15; animation: pulse 1s ease-in-out infinite alternate; }
  #statusDot.error { background: #f87171; }
  @keyframes pulse { from { opacity: 1; } to { opacity: 0.3; } }
  #statusText { font-size: 12px; color: #94a3b8; }
  .spacer { flex: 1; }
  #disconnectBtn {
    font-size: 12px;
    font-weight: 600;
    padding: 4px 12px;
    border: 1px solid #7f1d1d;
    border-radius: 5px;
    background: transparent;
    color: #f87171;
    cursor: pointer;
  }
  #disconnectBtn:hover { background: #2d1b1b; }
  #viewport {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
  }
  #canvas {
    display: block;
    cursor: none;
  }
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #64748b;
    font-size: 14px;
    gap: 12px;
    pointer-events: none;
  }
  #overlay .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid #2d3348;
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #overlay.hidden { display: none; }
</style>
</head>
<body>
<div id="toolbar">
  <span class="toolbar-logo">RemoteMaster</span>
  <span class="toolbar-code" id="codeLabel"></span>
  <div id="statusDot" class="waiting"></div>
  <span id="statusText">Connecting…</span>
  <span class="spacer"></span>
  <button id="disconnectBtn">Disconnect</button>
</div>
<div id="viewport">
  <canvas id="canvas"></canvas>
  <div id="overlay">
    <div class="spinner"></div>
    <span id="overlayMsg">Connecting to session…</span>
  </div>
</div>
<script src="/control.js"></script>
<script src="/viewer.js"></script>
</body>
</html>
