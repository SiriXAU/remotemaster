<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RemoteMaster — Support Connect</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #1a1d27;
    border: 1px solid #2d3348;
    border-radius: 12px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    text-align: center;
  }
  .logo {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #64748b;
    margin-bottom: 8px;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 32px;
    color: #f1f5f9;
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #64748b;
    margin-bottom: 10px;
  }
  .code-input {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 28px;
  }
  .code-input input {
    width: 44px;
    height: 56px;
    font-size: 24px;
    font-weight: 700;
    text-align: center;
    background: #0f1117;
    border: 2px solid #2d3348;
    border-radius: 8px;
    color: #f1f5f9;
    outline: none;
    transition: border-color 0.15s;
    caret-color: #6366f1;
  }
  .code-input input:focus { border-color: #6366f1; }
  .code-input input.filled { border-color: #4ade80; }
  .sep {
    display: flex;
    align-items: center;
    color: #4a5568;
    font-size: 20px;
    font-weight: 300;
    padding-bottom: 4px;
  }
  button {
    width: 100%;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    background: #6366f1;
    color: #fff;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
  }
  button:hover { background: #4f46e5; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .error {
    margin-top: 16px;
    padding: 10px 14px;
    background: #2d1b1b;
    border: 1px solid #7f1d1d;
    border-radius: 6px;
    color: #f87171;
    font-size: 13px;
    display: none;
  }
  .error.show { display: block; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">RemoteMaster</div>
  <h1>Enter Session Code</h1>
  <label>6-digit code provided by the client</label>
  <form id="form">
    <div class="code-input" id="digits">
      <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
      <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
      <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
      <span class="sep">·</span>
      <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
      <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
      <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
    </div>
    <button type="submit" id="connectBtn" disabled>Connect</button>
  </form>
  <div class="error" id="errMsg"></div>
</div>
<script>
const inputs = Array.from(document.querySelectorAll('.code-input input'));
const btn = document.getElementById('connectBtn');
const errMsg = document.getElementById('errMsg');

function getCode() { return inputs.map(i => i.value).join(''); }
function updateBtn() {
  const filled = getCode().length === 6;
  btn.disabled = !filled;
  inputs.forEach(i => i.classList.toggle('filled', i.value !== ''));
}

inputs.forEach((inp, idx) => {
  inp.addEventListener('input', e => {
    const v = inp.value.replace(/\D/g, '');
    inp.value = v ? v[v.length - 1] : '';
    updateBtn();
    if (inp.value && idx < inputs.length - 1) inputs[idx + 1].focus();
  });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !inp.value && idx > 0) inputs[idx - 1].focus();
  });
  inp.addEventListener('paste', e => {
    e.preventDefault();
    const paste = (e.clipboardData.getData('text') || '').replace(/\D/g, '').slice(0, 6);
    paste.split('').forEach((c, i) => { if (inputs[i]) inputs[i].value = c; });
    updateBtn();
    if (paste.length < 6) inputs[paste.length]?.focus();
    else inputs[5].focus();
  });
});
inputs[0].focus();

document.getElementById('form').addEventListener('submit', e => {
  e.preventDefault();
  const code = getCode();
  if (code.length !== 6) return;
  errMsg.classList.remove('show');
  window.location.href = `/viewer.html?code=${code}`;
});
</script>
</body>
</html>
