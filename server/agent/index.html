<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RemoteMaster — Support Connect</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 40px 16px;
  }
  .card {
    background: #1a1d27;
    border: 1px solid #2d3348;
    border-radius: 12px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    text-align: center;
  }
  .logo {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #64748b;
    margin-bottom: 8px;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 32px;
    color: #f1f5f9;
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #64748b;
    margin-bottom: 10px;
  }
  .code-input {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 28px;
  }
  .code-input input {
    width: 44px;
    height: 56px;
    font-size: 24px;
    font-weight: 700;
    text-align: center;
    background: #0f1117;
    border: 2px solid #2d3348;
    border-radius: 8px;
    color: #f1f5f9;
    outline: none;
    transition: border-color 0.15s;
    caret-color: #6366f1;
  }
  .code-input input:focus { border-color: #6366f1; }
  .code-input input.filled { border-color: #4ade80; }
  .sep {
    display: flex;
    align-items: center;
    color: #4a5568;
    font-size: 20px;
    font-weight: 300;
    padding-bottom: 4px;
  }
  button {
    width: 100%;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    background: #6366f1;
    color: #fff;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
  }
  button:hover { background: #4f46e5; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .error {
    margin-top: 16px;
    padding: 10px 14px;
    background: #2d1b1b;
    border: 1px solid #7f1d1d;
    border-radius: 6px;
    color: #f87171;
    font-size: 13px;
    display: none;
  }
  .error.show { display: block; }

  /* Download card */
  .download-card {
    padding: 28px 32px;
    text-align: left;
  }
  .download-card h2 {
    font-size: 14px;
    font-weight: 700;
    color: #f1f5f9;
    margin-bottom: 4px;
  }
  .download-card .sub {
    font-size: 12px;
    color: #64748b;
    margin-bottom: 18px;
  }
  .cmd-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #64748b;
    margin-bottom: 6px;
  }
  .cmd-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }
  .cmd-box {
    flex: 1;
    background: #0f1117;
    border: 1px solid #2d3348;
    border-radius: 6px;
    padding: 9px 12px;
    font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
    font-size: 12px;
    color: #a5b4fc;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .copy-btn {
    width: auto;
    padding: 8px 14px;
    font-size: 12px;
    background: #2d3348;
    flex-shrink: 0;
  }
  .copy-btn:hover { background: #3a4057; }
  .copy-btn.copied { background: #166534; }
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #2d3348;
  }
  .divider span { font-size: 11px; color: #4a5568; }
  .dl-btn {
    background: transparent;
    border: 1px solid #2d3348;
    color: #94a3b8;
    font-size: 13px;
    padding: 10px;
  }
  .dl-btn:hover { background: #1e2235; border-color: #6366f1; color: #f1f5f9; }
  .manual-note {
    margin-top: 12px;
    font-size: 11px;
    color: #4a5568;
    text-align: center;
    line-height: 1.5;
  }
  .manual-note a { color: #6366f1; text-decoration: none; }
  .manual-note a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">RemoteMaster</div>
  <h1>Enter Session Code</h1>
  <label>6-digit code provided by the client</label>
  <form id="form">
    <div class="code-input" id="digits">
      <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
      <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
      <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
      <span class="sep">·</span>
      <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
      <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
      <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
    </div>
    <button type="submit" id="connectBtn" disabled>Connect</button>
  </form>
  <div class="error" id="errMsg"></div>
</div>

<div class="card download-card">
  <h2>Run the Client Software</h2>
  <p class="sub">On the Windows machine to be controlled, open PowerShell and run:</p>
  <div class="cmd-label">One-line install &amp; launch</div>
  <div class="cmd-row">
    <div class="cmd-box" id="psCmd"></div>
    <button class="copy-btn" id="copyBtn" type="button">Copy</button>
  </div>
  <div class="divider"><span>or</span></div>
  <a id="dlLink" href="/launch.ps1" download="launch.ps1">
    <button class="dl-btn" type="button">Download launch.ps1</button>
  </a>
  <p class="manual-note">
    Prefer a direct download?
    <a href="https://github.com/sirixau/remotemaster/releases/latest/download/remotemaster-client.exe">remotemaster-client.exe</a>
    — place <code>server.txt</code> containing your server URL next to it.
  </p>
</div>

<script>
const inputs = Array.from(document.querySelectorAll('.code-input input'));
const btn = document.getElementById('connectBtn');
const errMsg = document.getElementById('errMsg');

function getCode() { return inputs.map(i => i.value).join(''); }
function updateBtn() {
  const filled = getCode().length === 6;
  btn.disabled = !filled;
  inputs.forEach(i => i.classList.toggle('filled', i.value !== ''));
}

inputs.forEach((inp, idx) => {
  inp.addEventListener('input', e => {
    const v = inp.value.replace(/\D/g, '');
    inp.value = v ? v[v.length - 1] : '';
    updateBtn();
    if (inp.value && idx < inputs.length - 1) inputs[idx + 1].focus();
  });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !inp.value && idx > 0) inputs[idx - 1].focus();
  });
  inp.addEventListener('paste', e => {
    e.preventDefault();
    const paste = (e.clipboardData.getData('text') || '').replace(/\D/g, '').slice(0, 6);
    paste.split('').forEach((c, i) => { if (inputs[i]) inputs[i].value = c; });
    updateBtn();
    if (paste.length < 6) inputs[paste.length]?.focus();
    else inputs[5].focus();
  });
});
inputs[0].focus();

document.getElementById('form').addEventListener('submit', e => {
  e.preventDefault();
  const code = getCode();
  if (code.length !== 6) return;
  errMsg.classList.remove('show');
  // If the deployment requires a pre-shared agent token (AGENT_TOKEN on the
  // server), it arrives on this page's URL and is passed through to the viewer.
  const token = new URLSearchParams(window.location.search).get('token');
  const tokenParam = token ? `&token=${encodeURIComponent(token)}` : '';
  window.location.href = `/viewer.html?code=${code}${tokenParam}`;
});

// Build the PowerShell one-liner using the current page's origin.
(function() {
  const origin = window.location.origin;
  const cmd = `irm ${origin}/launch.ps1 | iex`;
  document.getElementById('psCmd').textContent = cmd;

  const copyBtn = document.getElementById('copyBtn');
  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(cmd).then(() => {
      copyBtn.textContent = 'Copied!';
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.textContent = 'Copy';
        copyBtn.classList.remove('copied');
      }, 2000);
    });
  });
})();
</script>
</body>
</html>
