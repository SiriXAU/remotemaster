name: Build & Release Client

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true

      - name: Build Windows client EXE
        run: |
          mkdir -p dist
          cd client
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 \
            go build \
            -ldflags="-H windowsgui -s -w" \
            -o ../dist/remotemaster-client.exe \
            .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: remotemaster-client
          path: dist/remotemaster-client.exe
          retention-days: 30

      # On every push to main: update the rolling "latest" pre-release so
      # /releases/download/latest/remotemaster-client.exe always serves the
      # most recent build without requiring a version tag.
      - name: Update rolling release (latest)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git tag -f latest
          git push origin latest --force
          gh release create latest dist/remotemaster-client.exe \
            --title "Latest Build" \
            --notes "Automated build from \`main\` — $(date -u '+%Y-%m-%d %H:%M UTC') @ \`${{ github.sha }}\`" \
            --prerelease

      # On version tags: create a proper numbered release.
      - name: Create versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} dist/remotemaster-client.exe \
            --title "${{ github.ref_name }}" \
            --generate-notes
